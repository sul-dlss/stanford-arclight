services:
  solr:
    image: "solr:${SOLR_VERSION:-9.10.0}"
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - ./solr/conf:/opt/solr/conf
      - solr-data:/var/solr/data
    environment:
      - SOLR_HOME=/var/solr/data
      - SOLR_OPTS=-Dsolr.config.lib.enabled=true
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - blacklight-core
      - /opt/solr/conf
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/blacklight-core/admin/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: "redis:7.2-alpine"
    ports:
      - "6379:6379"
    command: redis-server
    volumes:
      - "redis:/data"

volumes:
  redis:
  solr-data:
