services:
  solr:
    image: "solr:${SOLR_VERSION:-9.10.0}"
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - $PWD/solr/conf:/opt/solr/conf
      - $PWD/solr-data:/var/solr/data
    environment:
      - SOLR_HOME=/var/solr/data
      - SOLR_OPTS=-Dsolr.config.lib.enabled=true
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - blacklight-core
      - /opt/solr/conf

  redis:
    image: "redis:7.2-alpine"
    ports:
      - "6379:6379"
    command: redis-server
    volumes:
      - "redis:/data"

volumes:
  redis:
  solr-data:
